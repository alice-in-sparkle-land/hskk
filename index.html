<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Reflex Practice</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 550px;
            text-align: center;
        }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 2rem; }
        .vi-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            min-height: 3.5rem;
            line-height: 1.4;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(74,144,226,0.2); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-submit { background: var(--primary); color: white; flex: 2; }
        .btn-hint { background: #f1c40f; color: #333; flex: 1; }
        .btn-next { background: #95a5a6; color: white; flex: 1; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        
        #result {
            margin-top: 2rem;
            padding: 1.2rem;
            border-radius: 12px;
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .wrong { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .ans-zh { font-size: 1.3rem; font-weight: bold; display: block; margin-top: 5px; color: #d35400; }
        .ans-py { font-size: 1rem; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>Luyện Phản Xạ HSK 3</h1>
    <div class="vi-text" id="displayVi">Đang tải dữ liệu...</div>
    
    <input type="text" id="userInput" placeholder="Nhập chữ Hán..." autocomplete="off">
    
    <div class="btn-group">
        <button class="btn-submit" onclick="check()">Nộp bài</button>
        <button class="btn-hint" onclick="showHint()">Gợi ý</button>
        <button class="btn-next" onclick="next()">Câu khác</button>
    </div>

    <div id="result"></div>
</div>

<script>
    let list = [];
    let current = {};

    // Tải dữ liệu từ file data.json
    async function init() {
        try {
            // "data.json" phải nằm cùng thư mục trên GitHub
            const resp = await fetch('data.json');
            list = await resp.json();
            next();
        } catch (err) {
            document.getElementById('displayVi').innerText = "Không thể tải file data.json";
            console.error(err);
        }
    }

    function next() {
        if (list.length === 0) return;
        current = list[Math.floor(Math.random() * list.length)];
        document.getElementById('displayVi').innerText = current.vi;
        document.getElementById('userInput').value = "";
        document.getElementById('result').style.display = "none";
        document.getElementById('userInput').focus();
    }

    function check() {
        const input = document.getElementById('userInput').value.trim();
        const resDiv = document.getElementById('result');
        if (!input) return;

        // Làm sạch dấu câu để so sánh chính xác hơn
        const clean = (str) => str.replace(/[，。？！\s]/g, "");
        const isCorrect = clean(input) === clean(current.zh);

        resDiv.style.display = "block";
        resDiv.className = isCorrect ? "correct" : "wrong";
        resDiv.innerHTML = isCorrect ? "<strong>Chính xác! 很好!</strong>" : "<strong>Chưa đúng rồi!</strong>";
        
        resDiv.innerHTML += `
            <div style="margin-top:8px">
                <span>Đáp án:</span>
                <span class="ans-zh">${current.zh}</span>
                <span class="ans-py">${current.py}</span>
            </div>
        `;
    }

    function showHint() {
        alert("Gợi ý Pinyin: " + current.py);
    }

    // Nhấn Enter để nộp bài nhanh
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') check();
    });

    init();
</script>

</body>
</html>
