<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语学习 · HSK Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1208; --paper: #f5f0e8; --warm: #e8dfc8; --gold: #c8962a; --red: #c0392b; --border: #d4c9b0; --card: #fdfaf4; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); color: var(--paper); padding: 15px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Noto Serif SC', serif; font-size: 20px; color: #e8b84b; }
  .level-bar { background: var(--ink); display: flex; justify-content: center; gap: 8px; padding-bottom: 15px; }
  .level-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 20px; border-radius: 20px; cursor: pointer; }
  .level-btn.active { background: var(--gold); border-color: var(--gold); font-weight: bold; }
  .nav-tabs { display: flex; border-bottom: 2px solid var(--border); background: var(--card); }
  .nav-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #8a7f70; }
  .nav-tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); font-weight: bold; }
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--warm); border-bottom: 1px solid var(--border); padding: 10px; }
  .stat-cell { text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); display: block; }
  .stat-label { font-size: 10px; text-transform: uppercase; }
  main { padding: 20px; max-width: 600px; margin: 0 auto; }
  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
  .vocab-vi { font-size: 28px; text-align: center; margin-bottom: 20px; font-weight: 300; }
  .answer-box { background: var(--warm); border-radius: 12px; padding: 20px; margin-top: 15px; display: none; text-align: center; }
  .answer-box.active { display: block; animation: fadeIn 0.3s ease; }
  .answer-hanzi { font-family: 'Noto Serif SC', serif; font-size: 50px; display: block; margin-bottom: 5px; }
  .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--gold); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .srs-row { display: none; gap: 10px; margin-top: 15px; }
  .srs-row.active { display: flex; }
  .srs-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: white; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header><div class="logo">汉语学习 <span>HSK Practice</span></div></header>
<div class="level-bar">
  <button class="level-btn active" onclick="changeLevel(3)">HSK 3</button>
  <button class="level-btn" onclick="changeLevel(4)">HSK 4</button>
  <button class="level-btn" onclick="changeLevel(5)">HSK 5</button>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="changeTab('vocab')">📖 Từ Vựng</div>
  <div class="nav-tab" onclick="changeTab('grammar')">✍️ Ngữ Pháp</div>
</div>

<div class="stats-bar">
  <div class="stat-cell"><span class="stat-num" id="learned">0</span><span class="stat-label">Đã học</span></div>
  <div class="stat-cell"><span class="stat-num" id="tokens">0</span><span class="stat-label">Tokens</span></div>
  <div class="stat-cell"><span class="stat-num" id="current-lvl">3</span><span class="stat-label">Level</span></div>
</div>

<main id="content"></main>

<script>
const GITHUB_USER = 'alice-in-sparkle-land';
const GITHUB_REPO = 'hskk';
const FOLDER_PATH = 'lessons';
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;

let state = { 
  level: 3, 
  tab: 'vocab', 
  data: { vocab: [], grammar: [], sentences: [] }, 
  index: 0, 
  showAnswer: false, 
  stats: { learned: 0, tokens: 0 }
};

async function fetchData(level) {
  try {
    const container = document.getElementById('content');
    container.innerHTML = `<div class="card">📡 Đang tải bài học HSK${level}...</div>`;

    const response = await fetch(API_URL);
    if (!response.ok) throw new Error("Không thể truy cập GitHub. Hãy đảm bảo Repo đã Public.");
    const files = await response.json();

    // Xóa dữ liệu cũ trước khi tải mới
    state.data = { vocab: [], grammar: [], sentences: [] };

    // Lọc tất cả các file liên quan đến level (ví dụ: hsk3)
    const relevantFiles = files.filter(f => f.name.toLowerCase().includes(`hsk${level}`));

    for (const file of relevantFiles) {
      const name = file.name.toLowerCase();
      const res = await fetch(file.download_url);
      if (!res.ok) continue;
      const jsonData = await res.json();

      // Phân loại và gộp (concat) dữ liệu vào state
      if (name.includes('vocab')) {
        state.data.vocab = state.data.vocab.concat(jsonData);
      } else if (name.includes('grammar')) {
        state.data.grammar = state.data.grammar.concat(jsonData);
      } else if (name.includes('sentence')) {
        state.data.sentences = state.data.sentences.concat(jsonData);
      }
    }

    state.index = 0;
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card" style="color:var(--red)">⚠️ Lỗi: ${e.message}</div>`;
  }
}

function render() {
  const container = document.getElementById('content');
  const items = state.data[state.tab] || [];
  
  if (items.length === 0) {
    container.innerHTML = `<div class="card">📭 Không tìm thấy dữ liệu cho HSK ${state.level}.</div>`;
    return;
  }

  const item = items[state.index % items.length];

  if (state.tab === 'vocab') {
    container.innerHTML = `
      <div class="card">
        <div class="vocab-vi">${item.vietnamese}</div>
        <button class="btn" onclick="showAns()">Xem đáp án</button>
        <div class="answer-box ${state.showAnswer ? 'active' : ''}">
          <span class="answer-hanzi">${item.chinese}</span>
          <div style="font-size:20px; color:#8a7f70">${item.pinyin}</div>
        </div>
        <div class="srs-row ${state.showAnswer ? 'active' : ''}">
          <button class="srs-btn" onclick="next()">Lại</button>
          <button class="srs-btn" style="color:var(--gold)" onclick="next(true)">Nhớ</button>
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="card">
        <div style="font-size:22px; color:var(--gold); margin-bottom:10px">${item.point}</div>
        <p style="line-height:1.6">${item.explanation_vi}</p>
        <div style="margin-top:15px; padding-top:15px; border-top:1px solid var(--border)">
          <strong>Cấu trúc:</strong> <code style="background:#eee; padding:2px 5px">${item.structure}</code>
        </div>
        <button class="btn" onclick="next()">Bài tiếp theo →</button>
      </div>`;
  }
  updateUI();
}

function showAns() { state.showAnswer = true; render(); }
function next(isLearned = false) {
  if (isLearned) { state.stats.learned++; state.stats.tokens += 10; }
  state.index++;
  state.showAnswer = false;
  render();
}
function changeLevel(l) { 
  state.level = l; 
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(l)));
  fetchData(l); 
}
function changeTab(t) { 
  state.tab = t; 
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.innerText.includes(t === 'vocab' ? 'Vựng' : 'Pháp')));
  state.index = 0; render(); 
}
function updateUI() {
  document.getElementById('learned').innerText = state.stats.learned;
  document.getElementById('tokens').innerText = state.stats.tokens;
  document.getElementById('current-lvl').innerText = state.level;
}

fetchData(3);
</script>
</body>
</html>
