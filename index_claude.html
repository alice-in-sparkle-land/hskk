<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语学习 · HSK Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --warm: #e8dfc8;
    --gold: #c8962a;
    --gold-light: #e8b84b;
    --red: #c0392b;
    --red-soft: #e74c3c;
    --green: #27ae60;
    --blue: #2471a3;
    --muted: #8a7f70;
    --border: #d4c9b0;
    --card: #fdfaf4;
    --shadow: rgba(26,18,8,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--gold-light);
  }
  .logo span { color: var(--paper); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; margin-left: 10px; opacity: 0.7; }

  /* ── LEVEL TABS ── */
  .level-bar {
    background: var(--ink);
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 0 24px 12px;
  }
  .level-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.55);
    padding: 6px 22px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: all .2s;
    font-family: 'Noto Serif SC', serif;
  }
  .level-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 700;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    background: var(--card);
    position: sticky;
    top: 56px;
    z-index: 90;
  }
  .nav-tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .nav-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    background: var(--paper);
  }
  .nav-tab .tab-icon { display: block; font-size: 20px; margin-bottom: 2px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell {
    background: var(--warm);
    text-align: center;
    padding: 10px 4px;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--gold);
    display: block;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { padding: 10px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
  .progress-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 5px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width .5s ease; }

  /* ── MAIN CONTENT ── */
  main { padding: 20px; max-width: 600px; margin: 0 auto; }

  /* ── QUEUE BADGE ── */
  .queue-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .queue-badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--warm);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 12px;
  }
  .refresh-all-btn {
    font-size: 12px;
    background: transparent;
    border: 1.5px solid var(--red-soft);
    color: var(--red-soft);
    padding: 5px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .refresh-all-btn:hover { background: var(--red-soft); color: white; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 16px var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
  }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── VOCAB CARD ── */
  .vocab-vi {
    font-size: 22px;
    font-weight: 300;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .vocab-vi em { font-style: italic; color: var(--muted); font-size: 16px; }

  /* ── DRAW CANVAS ── */
  .canvas-wrap {
    margin: 16px 0;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .canvas-label {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 14px 4px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  canvas.stroke-canvas {
    display: block;
    touch-action: none;
    cursor: crosshair;
    width: 100%;
    height: 160px;
  }
  .clear-canvas-btn {
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  /* ── ANSWER REVEAL ── */
  .answer-box {
    background: var(--warm);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 12px;
    display: none;
  }
  .answer-box.visible { display: block; animation: fadeIn .3s ease; }
  .answer-hanzi {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    color: var(--ink);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 4px;
  }
  .answer-pinyin {
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 14px;
  }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .example-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.6;
  }
  .example-pinyin { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .example-vi { font-size: 13px; color: var(--blue); font-style: italic; }

  /* ── GRAMMAR CARD ── */
  .grammar-point {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .grammar-struct {
    font-size: 12px;
    color: var(--muted);
    background: var(--warm);
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-family: monospace;
  }
  .grammar-explanation {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .hskk-note {
    font-size: 12px;
    color: var(--blue);
    background: rgba(36,113,163,0.08);
    border-left: 3px solid var(--blue);
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    margin-top: 8px;
  }
  .hskk-note::before { content: '💬 HSKK: '; font-weight: 600; }

  /* ── TRANSLATE INPUT ── */
  .translate-area {
    width: 100%;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 16px;
    font-family: 'Noto Serif SC', serif;
    resize: vertical;
    min-height: 80px;
    color: var(--ink);
    margin: 12px 0;
    outline: none;
    transition: border-color .2s;
  }
  .translate-area:focus { border-color: var(--gold); }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .btn {
    padding: 11px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .2s;
    flex: 1;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    font-weight: 700;
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-secondary {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink);
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-success { background: var(--green); color: white; }
  .btn-fail { background: var(--red); color: white; }

  /* ── SRS BUTTONS ── */
  .srs-row {
    display: none;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .srs-row.visible { display: flex; animation: fadeIn .3s ease; }
  .srs-btn {
    flex: 1;
    padding: 9px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid;
    text-align: center;
    transition: all .2s;
    min-width: 72px;
  }
  .srs-0 { border-color: var(--red); color: var(--red); }
  .srs-0:hover { background: var(--red); color: white; }
  .srs-1 { border-color: #e67e22; color: #e67e22; }
  .srs-1:hover { background: #e67e22; color: white; }
  .srs-2 { border-color: #f1c40f; color: #946c00; }
  .srs-2:hover { background: #f1c40f; color: var(--ink); }
  .srs-3 { border-color: var(--green); color: var(--green); }
  .srs-3:hover { background: var(--green); color: white; }
  .srs-4 { border-color: var(--blue); color: var(--blue); }
  .srs-4:hover { background: var(--blue); color: white; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; margin-bottom: 6px; }
  .empty-state small { font-size: 12px; }

  /* ── GRAMMAR MODE TOGGLE ── */
  .mode-toggle {
    display: flex;
    background: var(--warm);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .mode-opt {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all .2s;
    line-height: 1.4;
  }
  .mode-opt.active {
    background: var(--gold);
    color: var(--ink);
    font-weight: 700;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 999;
    transition: transform .3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── VOCAB GRID (10 words) ── */
  .word-counter {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
    background: var(--warm);
    padding: 6px;
    border-radius: 8px;
  }
  .dot-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .dot.done { background: var(--green); }
  .dot.current { background: var(--gold); }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .answer-hanzi { font-size: 34px; }
    main { padding: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">汉语学习 <span>HSK Practice</span></div>
  <div id="repo-badge" style="font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:.5px;font-family:monospace;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
</header>

<div class="level-bar">
  <button class="level-btn active" onclick="setLevel(3)">HSK 三</button>
  <button class="level-btn" onclick="setLevel(4)">HSK 四</button>
  <button class="level-btn" onclick="setLevel(5)">HSK 五</button>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="setTab('vocab')">
    <span class="tab-icon">📖</span>Từ Vựng
  </div>
  <div class="nav-tab" onclick="setTab('grammar')">
    <span class="tab-icon">✍️</span>Ngữ Pháp
  </div>
</div>

<div class="stats-bar">
  <div class="stat-cell"><span class="stat-num" id="s-learned">0</span><span class="stat-label">Đã học</span></div>
  <div class="stat-cell"><span class="stat-num" id="s-due">0</span><span class="stat-label">Cần ôn</span></div>
  <div class="stat-cell"><span class="stat-num" id="s-tokens">0</span><span class="stat-label">🪙 Tokens</span></div>
  <div class="stat-cell"><span class="stat-num" id="s-streak">0</span><span class="stat-label">🔥 Streak</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Tiến độ</span>
    <span id="prog-text">0 / 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<main>
  <div class="queue-info">
    <span class="queue-badge" id="queue-badge">⏳ Đang tải...</span>
    <button class="refresh-all-btn" onclick="confirmRefreshAll()">🔄 Ôn lại tất cả</button>
  </div>

  <div id="tab-vocab"></div>
  <div id="tab-grammar" style="display:none"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────
// ─── GITHUB REPO CONFIG ───────────────────────────
const GITHUB_USER  = 'alice-in-sparkle-land';
const GITHUB_REPO  = 'hskk';
const GITHUB_BRANCH = 'main';
const LESSONS_PATH = 'lessons';   // folder inside your repo

// Raw base for direct file fetches
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${LESSONS_PATH}/`;
// GitHub Contents API to list the folder (no auth needed for public repos)
const API_DIR   = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${LESSONS_PATH}`;

const SRS_INTERVALS = [
  { label: '10分钟', ms: 10 * 60 * 1000 },
  { label: '1 ngày', ms: 24 * 60 * 60 * 1000 },
  { label: '7 ngày', ms: 7 * 24 * 60 * 60 * 1000 },
  { label: '10 ngày', ms: 10 * 24 * 60 * 60 * 1000 },
  { label: '15 ngày', ms: 15 * 24 * 60 * 60 * 1000 },
  { label: '30 ngày', ms: 30 * 24 * 60 * 60 * 1000 },
];

// ─── STATE ────────────────────────────────────────
let state = {
  level: 3,
  tab: 'vocab',
  grammarMode: 'translate', // 'translate' | 'compose'
  vocab: {}, grammar: {}, sentences: {},
  srs: {},        // { itemId: { interval: 0..5, nextDue: timestamp, seen: bool } }
  stats: { learned: 0, tokens: 0, streak: 0, lastDate: null },
  vocabSession: [],  // 10 items for current session
  vocabIdx: 0,
  showAnswer: false,
  grammarItem: null,
};

// ─── STORAGE ──────────────────────────────────────
function save() {
  try {
    localStorage.setItem('hsk_srs', JSON.stringify(state.srs));
    localStorage.setItem('hsk_stats', JSON.stringify(state.stats));
    localStorage.setItem('hsk_session', JSON.stringify({
      level: state.level, tab: state.tab,
      vocabIdx: state.vocabIdx,
      vocabSession: state.vocabSession,
      grammarMode: state.grammarMode,
    }));
  } catch(e) {}
}

function load() {
  try {
    const srs = localStorage.getItem('hsk_srs');
    if (srs) state.srs = JSON.parse(srs);
    const stats = localStorage.getItem('hsk_stats');
    if (stats) state.stats = JSON.parse(stats);
    const sess = localStorage.getItem('hsk_session');
    if (sess) {
      const s = JSON.parse(sess);
      state.level = s.level || 3;
      state.tab = s.tab || 'vocab';
      state.grammarMode = s.grammarMode || 'translate';
      state.vocabSession = s.vocabSession || [];
      state.vocabIdx = s.vocabIdx || 0;
    }
  } catch(e) {}
}

// ─── DATA FETCH ───────────────────────────────────

// Cache of discovered filenames from the lessons/ folder
let _lessonFiles = null;   // null = not fetched yet, [] = fetched but empty, [...] = list of filenames

// Step 1: Ask GitHub API what JSON files exist in lessons/
async function discoverLessonFiles() {
  if (_lessonFiles !== null) return _lessonFiles;
  try {
    const r = await fetch(API_DIR, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!r.ok) throw new Error(`GitHub API ${r.status}`);
    const items = await r.json();
    _lessonFiles = items
      .filter(f => f.type === 'file' && f.name.endsWith('.json'))
      .map(f => f.name);
    console.log('[HSK] lessons/ files found:', _lessonFiles);
  } catch(e) {
    console.warn('[HSK] Could not list lessons/ via API, falling back to guesses.', e);
    _lessonFiles = [];   // will trigger fallback guessing below
  }
  return _lessonFiles;
}

// Step 2: Given a level (3/4/5) and type ('vocab'|'grammar'|'sentences'),
//         return ALL matching filenames so every file in lessons/ contributes.
//         Handles any naming order, separators, date suffixes, version tags, etc.
function matchFiles(files, level, type) {
  const levelStr = String(level);
  const t = type.toLowerCase();
  return files.filter(name => {
    const n = name.toLowerCase();
    // must contain the exact level tag (hsk3, hsk4, hsk5)
    const hasLevel = n.includes('hsk' + levelStr);
    // must contain the type keyword
    const hasType = n.includes(t);
    // must NOT also contain a different HSK level number (e.g. hsk4 in an hsk3 search)
    const noWrongLevel = ![3,4,5]
      .filter(l => l !== level)
      .some(l => n.includes('hsk' + l));
    return hasLevel && hasType && noWrongLevel;
  });
}

function matchFile(files, level, type) {
  const candidates = matchFiles(files, level, type);
  if (candidates.length === 0) return null;
  // Prefer shortest (most canonical) name, e.g. hsk3_vocab.json over hsk3_vocab_v1.json
  candidates.sort((a, b) => a.length - b.length);
  return candidates[0];
}

// Step 3: Fetch a single file by filename from the lessons/ folder
async function fetchLessonFile(filename) {
  const url = RAW_BASE + encodeURIComponent(filename);
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status} for ${filename}`);
    return await r.json();
  } catch(e) {
    console.warn('[HSK] Failed to fetch', filename, e);
    return [];
  }
}

// Step 4: Fallback guesses if API listing failed — try common naming patterns
const FALLBACK_PATTERNS = (level, type) => [
  `hsk${level}_${type}.json`,
  `${type}_hsk${level}.json`,
  `hsk${level}-${type}.json`,
  `${type}-hsk${level}.json`,
  `hsk${level}${type}.json`,
];

async function fetchWithFallback(level, type) {
  const files = await discoverLessonFiles();

  if (files.length > 0) {
    // Find ALL matching files for this level+type (handles duplicates, versions, dated names)
    const matched = matchFiles(files, level, type);
    if (matched.length > 0) {
      console.log(`[HSK] level=${level} type=${type} → merging:`, matched);
      // Fetch all in parallel and merge, deduplicating by 'id' field
      const arrays = await Promise.all(matched.map(f => fetchLessonFile(f)));
      const seen = new Set();
      const merged = [];
      for (const arr of arrays) {
        for (const item of arr) {
          const key = item.id || JSON.stringify(item);
          if (!seen.has(key)) { seen.add(key); merged.push(item); }
        }
      }
      console.log(`[HSK] level=${level} type=${type} → ${merged.length} items after merge`);
      return merged;
    }
    console.warn(`[HSK] No match for level=${level} type=${type} in`, files);
  }

  // Fallback: try common patterns in order
  for (const name of FALLBACK_PATTERNS(level, type)) {
    try {
      const r = await fetch(RAW_BASE + name);
      if (r.ok) {
        console.log(`[HSK] fallback hit: ${name}`);
        return await r.json();
      }
    } catch(e) { /* try next */ }
  }

  console.warn(`[HSK] All fetches failed for level=${level} type=${type}`);
  return [];
}

// isActive = true khi load level người dùng đang xem, false khi preload ngầm
async function loadData(level, isActive = false) {
  // Chỉ hiện loading spinner nếu đây là level đang active
  if (isActive) {
    ['tab-vocab', 'tab-grammar'].forEach(id => {
      const el = document.getElementById(id);
      if (el && el.style.display !== 'none') {
        el.innerHTML = `<div class="empty-state"><span class="big" style="font-size:32px;animation:spin 1s linear infinite;display:inline-block">⏳</span><p style="margin-top:12px">Đang tải HSK ${level}…</p><small>${GITHUB_USER}/${GITHUB_REPO}/${LESSONS_PATH}</small></div>`;
      }
    });
  }

  const [vocab, grammar, sentences] = await Promise.all([
    fetchWithFallback(level, 'vocab'),
    fetchWithFallback(level, 'grammar'),
    fetchWithFallback(level, 'sentences'),
  ]);
  state.vocab[level] = vocab;
  state.grammar[level] = grammar;
  state.sentences[level] = sentences;

  // Chỉ hiện error nếu đây là level đang active VÀ thực sự không có gì
  if (isActive && !vocab.length && !grammar.length) {
    ['tab-vocab', 'tab-grammar'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `
        <div class="empty-state">
          <span class="big">⚠️</span>
          <p>Không tìm thấy file cho HSK ${level}</p>
          <small style="display:block;margin-top:8px">Thư mục: <code>${LESSONS_PATH}/</code></small>
          <small>Tên file cần chứa <strong>hsk${level}</strong> và <strong>vocab</strong>/<strong>grammar</strong>/<strong>sentences</strong></small>
        </div>`;
    });
  }
}

// ─── SRS LOGIC ────────────────────────────────────
function getSRS(id) {
  return state.srs[id] || { interval: -1, nextDue: 0, seen: false };
}

function isDue(id) {
  const s = getSRS(id);
  return s.interval < 0 || Date.now() >= s.nextDue;
}

function markSRS(id, quality) {
  // quality: 0=again(10min), 1=hard(1d), 2=ok(7d), 3=good(10d), 4=great(15d), 5=easy(30d)
  const interval = Math.max(0, Math.min(quality, SRS_INTERVALS.length - 1));
  const wasNew = !state.srs[id]?.seen;
  state.srs[id] = {
    interval,
    nextDue: Date.now() + SRS_INTERVALS[interval].ms,
    seen: true,
  };
  if (wasNew) state.stats.learned++;
  state.stats.tokens += [1,2,3,4,5,6][interval];
  updateStreak();
  save();
  updateStats();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.stats.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.stats.lastDate === yesterday) {
      state.stats.streak++;
    } else if (state.stats.lastDate !== today) {
      state.stats.streak = 1;
    }
    state.stats.lastDate = today;
  }
}

function getDueItems(level, type) {
  const items = type === 'vocab' ? (state.vocab[level] || []) : (state.grammar[level] || []);
  return items.filter(i => isDue(i.id));
}

// ─── STATS UI ─────────────────────────────────────
function updateStats() {
  const level = state.level;
  const vTotal = (state.vocab[level] || []).length;
  const gTotal = (state.grammar[level] || []).length;
  const total = vTotal + gTotal;
  const learned = state.stats.learned;
  const due = getDueItems(level, 'vocab').length + getDueItems(level, 'grammar').length;

  document.getElementById('s-learned').textContent = learned;
  document.getElementById('s-due').textContent = due;
  document.getElementById('s-tokens').textContent = state.stats.tokens;
  document.getElementById('s-streak').textContent = state.stats.streak;
  document.getElementById('prog-text').textContent = `${learned} / ${total}`;
  const pct = total ? Math.round(learned / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';

  const tab = state.tab;
  const tabDue = getDueItems(level, tab).length;
  document.getElementById('queue-badge').textContent =
    tabDue > 0 ? `⏳ ${tabDue} thẻ cần ôn` : `✅ Xong hôm nay!`;
}

// ─── VOCAB TAB ────────────────────────────────────
function buildVocabSession() {
  const level = state.level;
  const vocab = state.vocab[level] || [];
  // Priority: due items first, then new
  const due = vocab.filter(v => isDue(v.id));
  const notDue = vocab.filter(v => !isDue(v.id));
  const pool = [...due, ...notDue];
  state.vocabSession = pool.slice(0, 10).map(v => v.id);
  state.vocabIdx = 0;
  state.showAnswer = false;
}

function renderVocabTab() {
  const container = document.getElementById('tab-vocab');
  const level = state.level;
  const vocab = state.vocab[level] || [];

  if (!vocab.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">📡</span><p>Đang tải dữ liệu...</p><small>Kiểm tra kết nối và đường dẫn GitHub</small></div>`;
    return;
  }

  if (!state.vocabSession.length || state.vocabIdx >= state.vocabSession.length) {
    buildVocabSession();
  }

  const dots = state.vocabSession.map((id, i) => {
    if (i < state.vocabIdx) return `<div class="dot done"></div>`;
    if (i === state.vocabIdx) return `<div class="dot current"></div>`;
    return `<div class="dot"></div>`;
  }).join('');

  if (state.vocabIdx >= state.vocabSession.length) {
    container.innerHTML = `
      <div class="dot-row">${dots}</div>
      <div class="empty-state">
        <span class="big">🎉</span>

          <button class="btn btn-primary" onclick="buildVocabSession();renderVocabTab()">Học thêm 10 từ</button>
        </div>

    return;
  }

  const wordId = state.vocabSession[state.vocabIdx];
  const word = vocab.find(v => v.id === wordId);
  if (!word) { state.vocabIdx++; renderVocabTab(); return; }

  const srsInfo = getSRS(word.id);
  const isNew = !srsInfo.seen;
  const due = isDue(word.id);

  container.innerHTML = `
    <div class="dot-row">${dots}</div>

        <div class="canvas-label">
  <span>✏️ Luyện viết chữ Hán</span>
  <button type="button" class="clear-canvas-btn" onclick="clearCanvas()">Xóa</button>
</div>
        <canvas class="stroke-canvas" id="stroke-canvas" width="560" height="160"></canvas>
      </div>

// ─── CANVAS DRAWING ───────────────────────────────
let isDrawing = false, ctx = null;

function initCanvas() {
  const canvas = document.getElementById('stroke-canvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1; // Lấy tỉ lệ màn hình thực tế
  const rect = canvas.getBoundingClientRect();
  
  // 1. Thiết lập kích thước hiển thị cố định (CSS)
  canvas.style.width = rect.width + "px";
  canvas.style.height = "160px";
  
  // 2. Nâng cao độ phân giải thực tế của canvas
  canvas.width = rect.width * dpr;
  canvas.height = 160 * dpr;
  
  // 3. Scale context để các lệnh vẽ sau này tự khớp với dpr
  ctx.scale(dpr, dpr);

  // Cấu hình nét vẽ mượt (Line Smoothing)
  ctx.strokeStyle = '#1a1208';
  ctx.lineWidth = 2.2; // Độ dày vừa phải cho chữ Hán
  ctx.lineCap = 'round'; // Bo tròn đầu nét
  ctx.lineJoin = 'round'; // Bo tròn các góc nối
  
  // Vẽ lại Grid Guide (đã điều chỉnh cho dpr)
  ctx.strokeStyle = '#e8dfc8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(rect.width/2, 0); ctx.lineTo(rect.width/2, 160);
  ctx.moveTo(0, 80); ctx.lineTo(rect.width, 80);
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Thiết lập lại màu mực sau khi vẽ lưới
  ctx.strokeStyle = '#1a1208';
  ctx.lineWidth = 2.2;

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };

  canvas.onmousedown = canvas.ontouchstart = (e) => {
    e.preventDefault(); isDrawing = true;
    const {x,y} = getPos(e);
    ctx.beginPath(); ctx.moveTo(x, y);
  };

  canvas.onmousemove = canvas.ontouchmove = (e) => {
    e.preventDefault(); if (!isDrawing) return;
    const {x,y} = getPos(e);
    ctx.lineTo(x, y); ctx.stroke();
  };

  canvas.onmouseup = canvas.ontouchend = () => { isDrawing = false; };
}

function clearCanvas() {
  const canvas = document.getElementById('stroke-canvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  // Xóa toàn bộ dựa trên kích thước thật (đã nhân dpr)
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Vẽ lại lưới Guide
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  
  ctx.strokeStyle = '#e8dfc8'; 
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]); 
  ctx.beginPath();
  ctx.moveTo(rect.width / 2, 0); ctx.lineTo(rect.width / 2, 160);
  ctx.moveTo(0, 80); ctx.lineTo(rect.width, 80);
  ctx.stroke(); 
  
  // Trả lại cấu hình bút
  ctx.setLineDash([]);
  ctx.strokeStyle = '#1a1208'; 
  ctx.lineWidth = 2.2;
}

function getRandomGrammarItem() {
  const level = state.level;
  const grammar = state.grammar[level] || [];
  const sentences = state.sentences[level] || [];
  const due = grammar.filter(g => isDue(g.id));
  const pool = due.length ? due : grammar;
  if (!pool.length) return null;
  const g = pool[Math.floor(Math.random() * pool.length)];
  const relatedSentences = sentences.filter(s => s.grammar_id === g.id);
  const sentence = relatedSentences.length
    ? relatedSentences[Math.floor(Math.random() * relatedSentences.length)]
    : null;
  return { grammar: g, sentence };
}

    b.classList.toggle('active', ['vocab','grammar'][i] === tab);
  });
  document.getElementById('tab-vocab').style.display = tab === 'vocab' ? '' : 'none';
  document.getElementById('tab-grammar').style.display = tab === 'grammar' ? '' : 'none';
  save();
  render();
}

function render() {
  if (state.tab === 'vocab') renderVocabTab();
  else renderGrammarTab();
}

function confirmRefreshAll() {
  if (confirm('Đặt lại lịch ôn tập của tất cả thẻ? (Stats vẫn được giữ)')) {
    const level = state.level;
    const allItems = [
      ...(state.vocab[level] || []),
      ...(state.grammar[level] || []),
    ];
    allItems.forEach(item => {
      if (state.srs[item.id]) {
        state.srs[item.id].nextDue = Date.now();
        state.srs[item.id].interval = 0;
      }
    });
    state.vocabSession = [];
    state.vocabIdx = 0;
    state.grammarItem = null;
    save();
    showToast('🔄 Đã đặt lại! Ôn lại tất cả nào~');
    render();
  }
}

// ─── TOAST ────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ─────────────────────────────────────────
async function init() {
  load();
  // Set UI state
  document.querySelectorAll('.level-btn').forEach((b, i) => {
    b.classList.toggle('active', [3,4,5][i] === state.level);
  });
  document.querySelectorAll('.nav-tab').forEach((b, i) => {
    b.classList.toggle('active', ['vocab','grammar'][i] === state.tab);
  });
  document.getElementById('tab-vocab').style.display = state.tab === 'vocab' ? '' : 'none';
  document.getElementById('tab-grammar').style.display = state.tab === 'grammar' ? '' : 'none';

  // Show repo source badge
  const badge = document.getElementById('repo-badge');
  if (badge) badge.textContent = `📂 ${GITHUB_USER}/${LESSONS_PATH}`;

  // Pre-discover all lesson files once (shared across all level loads)
  await discoverLessonFiles();

  // Show discovered file count in badge
  if (badge && _lessonFiles) {
    const n = _lessonFiles.length;
    badge.textContent = n > 0
      ? `📂 ${n} files in lessons/`
      : `⚠️ lessons/ empty or unreachable`;
    badge.title = _lessonFiles.join('\n');
  }

  await loadData(state.level, true); // isActive=true: level đang hiện
  // Preload các level khác ngầm — isActive=false nên không ghi đè UI
  [3,4,5].filter(l => l !== state.level).forEach(l => loadData(l, false));
  render();
}

init();
</script>
</body>
</html>
